<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FlockSense AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #10b981;
            --primary-hover: #059669;
            --bg-dark: #020617;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        ::view-transition-group(*),
        ::view-transition-old(*),
        ::view-transition-new(*) {
            animation-duration: 0.25s;
            animation-timing-function: cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background: url('/static/poultry_bg.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.9) 100%);
            z-index: 0;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 1.8rem 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area { text-align: center; margin-bottom: 1rem; }
        .logo-area i { font-size: 1.8rem; color: var(--primary); margin-bottom: 0.5rem; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .input-group, .btn, .footer-links {
            opacity: 0;
            transform: translateY(20px);
            animation: slideUpFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }
        .input-group:nth-child(1) { animation-delay: 0.1s; }
        .input-group:nth-child(2) { animation-delay: 0.2s; }
        .input-group:nth-child(3) { animation-delay: 0.3s; }
        .btn { animation-delay: 0.4s; }
        .footer-links { animation-delay: 0.5s; }

        .input-field {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: white; padding: 0.8rem 1rem; border-radius: 12px; font-size: 1rem;
            transition: all 0.3s ease;
        }
        .input-field:focus { 
            outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); 
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .input-field:not(:placeholder-shown):valid { border-color: var(--primary); }
        .input-field:not(:placeholder-shown):invalid { border-color: #ef4444; }

        .password-wrapper { position: relative; display: flex; align-items: center; }
        .password-toggle { position: absolute; right: 1rem; color: var(--text-muted); cursor: pointer; transition: color 0.3s ease; }
        .password-toggle:hover { color: var(--primary); }

        .btn {
            background: var(--primary); color: #fff; font-weight: 800; padding: 0.9rem;
            border: none; border-radius: 12px; cursor: pointer; width: 100%;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; margin-top: 0.5rem;
            position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .btn::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg) translateY(-100%); transition: transform 0.6s ease;
        }
        .btn:hover::after { transform: rotate(45deg) translateY(100%); }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 15px 30px -10px rgba(16, 185, 129, 0.4); }

        .spinner {
            display: none; width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .particle {
            position: absolute; width: 8px; height: 8px; background: var(--primary);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            animation: explode 1s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }
        @keyframes explode {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
        }

        .footer-links { margin-top: 1.5rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; margin-left: 5px; }

        .error-toast {
            background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <i class="fas fa-feather-pointed"></i>
            <h1 style="display: flex; align-items: center; justify-content: center; gap: 8px;">
                FlockSense <span style="background: var(--primary); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 1rem; line-height: 1; margin-top: 2px;">AI</span>
            </h1>
            <p>Join the future of poultry analytics</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="error-toast"><i class="fas fa-exclamation-circle"></i> {{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" autocomplete="off">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" class="input-field" placeholder="Choose username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" class="input-field" placeholder="username@gmail.com" required autocomplete="off">
            </div>
            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="password" class="input-field" placeholder="Minimum 8 characters" required minlength="8" autocomplete="new-password">
                    <i class="fas fa-eye password-toggle" onclick="togglePassword('password')"></i>
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">
                <span class="btn-text">Create Account</span>
                <div class="spinner"></div>
            </button>
        </form>


        <div class="footer-links">
            Already have an account? <a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>
    <script>
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                document.body.appendChild(particle);
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * velocity;
                const ty = Math.sin(angle) * velocity;
                
                particle.style.left = x + 'px';
                particle.style.top = y + 'px';
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                setTimeout(() => particle.remove(), 1000);
            }
        }

        const form = document.querySelector('form');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const btnText = document.querySelector('.btn-text');
            const spinner = document.querySelector('.spinner');
            
            // Validation check to ensure native validation still works
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }
            
            btnText.style.display = 'none';
            spinner.style.display = 'inline-block';
            btn.style.pointerEvents = 'none';
            
            setTimeout(() => {
                const rect = btn.getBoundingClientRect();
                createParticles(rect.left + rect.width / 2, rect.top + rect.height / 2);
                
                btnText.innerText = "Success!";
                btnText.style.display = 'inline-block';
                spinner.style.display = 'none';
                btn.style.background = '#059669'; 
                
                setTimeout(() => form.submit(), 800);
            }, 1000);
        });
    </script>
</body>
</html>
