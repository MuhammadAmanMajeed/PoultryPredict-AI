<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PoultryPredict</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #fbbf24;
            --primary-hover: #f59e0b;
            --bg-dark: #020617;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

        body {
            background: url('/static/poultry_bg.png') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, rgba(2, 6, 23, 0.4) 0%, rgba(2, 6, 23, 0.9) 100%);
            z-index: 0;
        }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
            z-index: 1;
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area { text-align: center; margin-bottom: 1.5rem; }
        .logo-area i { font-size: 2.2rem; color: var(--primary); margin-bottom: 0.8rem; }
        .logo-area h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.3rem; }
        .logo-area p { color: var(--text-muted); font-size: 0.9rem; }


        .input-group { margin-bottom: 1.5rem; }
        .input-group label {
            display: block; font-size: 0.8rem; font-weight: 700; color: var(--primary);
            text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.6rem;
        }
        .input-field {
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border);
            color: white; padding: 1rem 1.2rem; border-radius: 12px; font-size: 1rem;
            transition: all 0.3s ease;
        }
        .input-field:focus { outline: none; border-color: var(--primary); background: rgba(0,0,0,0.5); }

        .btn {
            background: var(--primary); color: #000; font-weight: 800; padding: 1.1rem;
            border: none; border-radius: 12px; cursor: pointer; width: 100%;
            font-size: 1rem; text-transform: uppercase; letter-spacing: 1px;
            transition: all 0.3s ease; margin-top: 1rem;
        }
        .btn:hover { background: var(--primary-hover); transform: translateY(-2px); box-shadow: 0 15px 30px -10px rgba(251, 191, 36, 0.4); }

        .footer-links { margin-top: 2rem; text-align: center; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links a { color: var(--primary); text-decoration: none; font-weight: 700; margin-left: 5px; }

        .error-toast {
            background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area">
            <i class="fas fa-microscope"></i>
            <h1>PoultryPredict</h1>
            <p>Next-Gen Analytics for Poultry Science</p>
        </div>

        {% if error %}
            <div class="error-toast"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST" autocomplete="off">
            <div class="input-group">
                <label>Institutional Identifier</label>
                <input type="text" name="username" class="input-field" placeholder="Username" required autocomplete="new-username">
            </div>
            <div class="input-group">
                <label>Secure Access Key</label>
                <input type="password" name="password" class="input-field" placeholder="••••••••" required autocomplete="new-password">
            </div>
            <button type="submit" class="btn">Authenticate Access</button>
        </form>


        <div class="footer-links">
            Don't have an institutional account? <a href="{{ url_for('register') }}">Join the Platform</a>
        </div>
    </div>
</body>
</html>
